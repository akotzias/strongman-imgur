<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/strongman-imgur/">
    <title>World's Strongest Man 2026 imgur posts</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>World's Strongest Man 2026 imgur posts</h1>
      <div class="duke-gallery" id="duke-gallery"></div>
      <p class="intro">
        Imgur links shared in r/StrongmanHQ's WSM 2026 megathreads, pulled together in one place.
      </p>
      <p class="source-note">
        Scraped from Reddit every 5 minutes and committed to
        <a href="https://github.com/akotzias/strongman-imgur" target="_blank" rel="noopener">github.com/akotzias/strongman-imgur</a>.
      </p>
      <p id="generated"></p>
      <p class="donate-wrap">
        <a class="donate" href="https://paypal.me/AlexandrosKotzias" target="_blank" rel="noopener">Buy me a coffee</a>
      </p>
      <div id="threads"></div>
    </main>
    <script>
      (() => {
        const images = [
          "https://upload.wikimedia.org/wikipedia/en/7/72/DukeNukem1Titlecard.gif",
          "https://upload.wikimedia.org/wikipedia/en/b/b0/Dukenukem1.png",
          "https://archive.org/serve/DukeNukem/DukeNukem-EpisodeOne-SharpnelCity1991apogeeSoftwareLtd.action_screenshot.gif",
        ];
        const shuffled = [...images].sort(() => Math.random() - 0.5);
        const gallery = document.getElementById("duke-gallery");
        for (const url of shuffled) {
          const img = document.createElement("img");
          img.src = url;
          img.alt = "Duke Nukem (1991)";
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";
          gallery.appendChild(img);
        }
      })();
    </script>
    <script src="./app.js"></script>
  </body>
</html>
